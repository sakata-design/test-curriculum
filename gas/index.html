<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 32px;
      max-width: 420px;
      width: 100%;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .description {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 8px;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #4285f4;
      box-shadow: 0 0 0 2px rgba(66,133,244,0.2);
    }

    .preview {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
      min-height: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4285f4;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: #3367d6; }
    button:disabled { background: #ccc; cursor: not-allowed; }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }

    .status.loading {
      display: block;
      background: #e8f0fe;
      color: #1a73e8;
    }

    .status.success {
      display: block;
      background: #e6f4ea;
      color: #137333;
    }

    .status.error {
      display: block;
      background: #fce8e6;
      color: #c5221f;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>テストプログラムのコピー</h1>
    <p class="description">
      名前を入力して「コピー開始」を押すと、共有 Drive のテストプログラムがあなたのマイドライブにコピーされます。
    </p>

    <label for="userName">氏名</label>
    <input type="text" id="userName" placeholder="例: 山田太郎">
    <div class="preview" id="preview"></div>

    <button id="copyBtn" onclick="startCopy()">コピー開始</button>

    <div class="status" id="status"></div>
  </div>

  <script>
    var nameInput = document.getElementById('userName');
    var preview = document.getElementById('preview');
    var btn = document.getElementById('copyBtn');
    var status = document.getElementById('status');

    // 入力に応じてフォルダ名プレビューを更新
    nameInput.addEventListener('input', function() {
      var name = nameInput.value.trim();
      if (name) {
        var today = new Date();
        var y = today.getFullYear();
        var m = String(today.getMonth() + 1).padStart(2, '0');
        var d = String(today.getDate()).padStart(2, '0');
        preview.textContent = '作成されるフォルダ: テストプログラム_' + name + '_' + y + m + d;
      } else {
        preview.textContent = '';
      }
    });

    function startCopy() {
      var name = nameInput.value.trim();
      if (!name) {
        showStatus('error', '名前を入力してください。');
        return;
      }

      btn.disabled = true;
      nameInput.disabled = true;
      showStatus('loading', 'コピー中です。しばらくお待ちください...');

      google.script.run
        .withSuccessHandler(function(msg) {
          showStatus('success', msg + '\nGoogle Drive のマイドライブを確認してください。');
          btn.textContent = '完了';
        })
        .withFailureHandler(function(err) {
          showStatus('error', err.message);
          btn.disabled = false;
          nameInput.disabled = false;
        })
        .copyTestProgram(name);
    }

    function showStatus(type, message) {
      status.className = 'status ' + type;
      status.textContent = message;
    }
  </script>
</body>
</html>
